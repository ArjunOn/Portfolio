<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mallikarjuna Mannem - Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        function loadContent(section) {
            fetch(section + '.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('content').innerHTML = data;
                });
        }
        document.addEventListener('DOMContentLoaded', function () {
            loadContent('home');
        });
    </script>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#" onclick="loadContent('home')">Home</a></li>
                <li><a href="#" onclick="loadContent('about')">About</a></li>
                <li><a href="#" onclick="loadContent('education')">Education</a></li>
                <li><a href="#" onclick="loadContent('skills')">Skills</a></li>
                <li><a href="#" onclick="loadContent('projects')">Projects</a></li>
                <li><a href="#" onclick="loadContent('resume')">Resume</a></li>
                <li><a href="#" onclick="loadContent('contact')">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="content"></section>

    <footer>
        <p>&copy; 2024 Mallikarjuna Mannem</p>
    </footer>
</body>
</html>
